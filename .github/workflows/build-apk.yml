name: Build and Release Apk

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Checkout the code
    - uses: actions/checkout@v4
    
    # Step 2: Set up JDK 17
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    # Step 3: Grant execute permission for gradlew
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # Step 4: Build both Debug and Release APKs
    - name: Build Debug and Release APKs
      run: |
        ./gradlew assembleDebug
        ./gradlew assembleRelease

    # Step 5: Extract version name from build.gradle.kts
    - name: Get version name from build.gradle.kts
      id: get_version
      run: |
        VERSION_NAME=$(grep "versionName =" app/build.gradle.kts | head -n 1 | cut -d'"' -f2)
        echo "version=v$VERSION_NAME" >> "$GITHUB_OUTPUT"

    # Step 6: Create GitHub Release and Upload APKs
    - name: Create Release
      if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.get_version.outputs.version }}
        name: Release ${{ steps.get_version.outputs.version }}
        body: |
          Automatic release of BCR Call Recordings Player ${{ steps.get_version.outputs.version }}.
          
          Assets included:
          - Debug APK
          - Release APK (Signed with Debug keys)
        files: |
          app/build/outputs/apk/debug/*.apk
          app/build/outputs/apk/release/*.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
